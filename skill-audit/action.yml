name: 'Skill Audit'
description: 'Analyze a PR for skill usage opportunities and post a sticky comment.'
author: 'ojfbot'

inputs:
  pr-number:
    description: 'Pull request number to audit. Defaults to the triggering PR.'
    required: false
    default: ${{ github.event.pull_request.number }}
  mode:
    description: 'Audit mode: auto (default) | both | heuristic | local. auto uses both when telemetry is available, heuristic otherwise.'
    required: false
    default: 'auto'

runs:
  using: 'composite'
  steps:
    - name: Fetch telemetry snapshot (optional)
      id: telemetry
      shell: bash
      continue-on-error: true
      working-directory: ${{ github.workspace }}
      run: |
        git fetch origin telemetry/daily 2>/dev/null || exit 0
        mkdir -p /tmp/telemetry
        git show origin/telemetry/daily:tool-telemetry.jsonl > /tmp/telemetry/tool-telemetry.jsonl 2>/dev/null || true
        git show origin/telemetry/daily:skill-telemetry.jsonl > /tmp/telemetry/skill-telemetry.jsonl 2>/dev/null || true
        git show origin/telemetry/daily:session-telemetry.jsonl > /tmp/telemetry/session-telemetry.jsonl 2>/dev/null || true
        echo "available=true" >> "$GITHUB_OUTPUT"

    - name: Run skill audit
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        GH_TOKEN: ${{ github.token }}
        TELEMETRY_DIR: /tmp/telemetry
      run: |
        # Resolve effective mode
        REQUESTED="${{ inputs.mode }}"
        if [[ "$REQUESTED" == "auto" ]]; then
          if [[ "${{ steps.telemetry.outputs.available }}" == "true" ]]; then
            EFFECTIVE="both"
          else
            EFFECTIVE="heuristic"
          fi
        else
          EFFECTIVE="$REQUESTED"
        fi
        echo "::notice::Running skill audit in mode=$EFFECTIVE for PR #${{ inputs.pr-number }}"
        bash "${{ github.action_path }}/pr-skill-audit.sh" \
          --pr="${{ inputs.pr-number }}" \
          --mode="$EFFECTIVE"

    - name: Post audit comment (upsert)
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const BOT_MARKER = '<!-- skill-audit-results -->';

          let report;
          try {
            report = fs.readFileSync('/tmp/skill-audit-report.md', 'utf8');
          } catch {
            report = '_No audit report generated._';
          }

          const fullBody = BOT_MARKER + '\n' + report;

          const existing = await github.rest.issues.listComments({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
          });

          const botComment = existing.data.find(
            c => c.body && c.body.includes(BOT_MARKER)
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: fullBody,
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: fullBody,
            });
          }
