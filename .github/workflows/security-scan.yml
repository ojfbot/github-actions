name: Security Scan (reusable)

# Reusable workflow — call from a consumer repo via:
#
#   jobs:
#     security:
#       uses: ojfbot/github-actions/.github/workflows/security-scan.yml@v1
#
# Two parallel jobs: secret-scan (TruffleHog + key grep + dist guard) and
# dependency-audit (pnpm audit). Mirrors the per-repo security-scan.yml that
# was duplicated across 11 ojfbot repos prior to ADR-0055.

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node version for the dependency audit'
        required: false
        type: string
        default: '22'
      audit-level:
        description: 'pnpm audit severity threshold'
        required: false
        type: string
        default: 'high'
      skip-dependency-audit:
        description: 'Skip dependency audit (e.g. for non-pnpm repos)'
        required: false
        type: boolean
        default: false

jobs:
  secret-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        if: github.event_name != 'push' || github.event.before != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@b6389e24199ff37a98a48f90b95d775af819a95d
        with:
          path: ./
          base: ${{ github.event_name == 'push' && github.event.before || github.event.repository.default_branch }}
          head: HEAD
          extra_args: --json

      - name: Check for API keys in code
        run: |
          echo "Checking for hardcoded API keys..."
          if git grep -E "sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{90,}" -- '*.ts' '*.js' '*.tsx' '*.jsx' '*.json' ':!*.example' ':!.github/workflows/*'; then
            echo "ERROR: API keys found in tracked files!"
            exit 1
          else
            echo "No API keys found in code"
          fi

      - name: Verify dist/ not committed
        run: |
          echo "Checking for dist/ artifacts..."
          if git ls-files | grep -E "dist/|build/" | grep -v "dist/README.md"; then
            echo "ERROR: Build artifacts found in git!"
            exit 1
          else
            echo "No build artifacts committed"
          fi

  dependency-audit:
    name: Audit Dependencies
    if: ${{ !inputs.skip-dependency-audit }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        continue-on-error: true
        run: |
          echo "Auditing production dependencies for vulnerabilities..."
          pnpm audit --prod --audit-level=${{ inputs.audit-level }} || echo "WARNING: vulnerabilities found (review above)"
